<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bildanalyse mit Koordinatensystem und Fit-Overlay</title>
  <style>
    :root{
      --bg:#f1f5f9;
      --card:#ffffff;
      --line:#cbd5e1;
      --text:#0f172a;
      --muted:#475569;
      --accent:#2563eb;
      --accent2:#7c3aed;
      --accent3:#16a34a;
      --fit:#ef4444;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .app{
      max-width:1400px;
      margin:0 auto;
      padding:20px;
      display:grid;
      grid-template-columns:360px 1fr;
      gap:20px;
      min-height:100vh;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 1px 4px rgba(15,23,42,.06);
      overflow:hidden;
    }
    .panel{
      padding:18px;
    }
    h1{
      font-size:22px;
      margin:0 0 14px 0;
    }
    h2{
      font-size:16px;
      margin:18px 0 10px 0;
    }
    .dropzone{
      border:2px dashed var(--line);
      border-radius:16px;
      background:#f8fafc;
      padding:18px;
      text-align:center;
      transition:.15s ease;
    }
    .dropzone.drag{
      background:#e2e8f0;
      border-color:#0f172a;
    }
    .dropzone p{
      margin:8px 0 12px 0;
      color:var(--muted);
      font-size:14px;
    }
    button, select, input[type="number"], input[type="text"]{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      background:#fff;
      color:var(--text);
    }
    button{
      background:var(--text);
      color:#fff;
      cursor:pointer;
      font-weight:600;
    }
    button.secondary{
      background:#fff;
      color:var(--text);
    }
    button.toggle.on{
      background:var(--text);
      color:#fff;
    }
    button.toggle.off{
      background:#fff;
      color:var(--text);
    }
    .row{
      display:grid;
      gap:10px;
      margin:12px 0;
    }
    .twocol{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    label{
      display:block;
      font-size:13px;
      margin-bottom:6px;
      color:var(--muted);
      font-weight:600;
    }
    .hint{
      background:#f8fafc;
      border:1px solid #e2e8f0;
      border-radius:14px;
      padding:12px;
      color:var(--muted);
      font-size:14px;
      line-height:1.4;
    }
    .formula{
      background:#f8fafc;
      border:1px solid #e2e8f0;
      border-radius:14px;
      padding:12px;
      font-size:14px;
    }
    .param-card{
      min-width:220px;
      flex:0 0 220px;
      border:1px solid #e2e8f0;
      border-radius:14px;
      padding:12px;
      margin:10px 0;
      background:#fff;
    }
    .param-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      margin-bottom:8px;
      font-size:14px;
    }
    input[type="range"]{
      width:100%;
      margin:8px 0;
    }
    .canvas-wrap{
      padding:14px;
      height:100%;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      overflow:auto;
      background:#fff;
    }
    canvas{
      display:block;
      max-width:100%;
      border-radius:14px;
      background:#fff;
      cursor:crosshair;
      touch-action:none;
    }
    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-top:16px;
    }
    .tabbtn{
      background:#fff;
      color:var(--text);
    }
    .tabbtn.active{
      background:var(--text);
      color:#fff;
    }
    .tab{
      display:none;
      margin-top:14px;
    }
    .tab.active{
      display:block;
    }
    .small{
      font-size:12px;
      color:var(--muted);
    }
    @media (max-width: 980px){
      .app{grid-template-columns:1fr}
    }
  
    #paramContainer{
      display:flex;
      gap:12px;
      overflow-x:auto;
      padding:14px;
      align-items:flex-start;
      min-height:120px;
      width:100%;
    }
    .slider-bar{
      grid-column:1 / -1;
      display:block;
    }
    .slider-bar .panel{
      padding:14px;
      display:block;
    }
    .param-card{
      min-width:220px;
      flex:0 0 220px;
      margin:0;
    }


    .canvas-stack{
      position:relative;
      display:inline-block;
      max-width:100%;
    }
    #legendOverlay{
      position:absolute;
      left:24px;
      top:24px;
      background:rgba(255,255,255,0.88);
      border:1.5px solid #2563eb;
      border-radius:8px;
      padding:8px 10px;
      font-size:12px;
      color:#0f172a;
      cursor:move;
      user-select:none;
      touch-action:none;
      z-index:10;
      display:none;
      max-width:min(70%, 520px);
      width:max-content;
      box-shadow:0 1px 4px rgba(15,23,42,.08);
    }
    #legendOverlay .MathJax, #legendOverlay svg{
      pointer-events:none;
    }


    #legendOverlay{
      font-family: "Times New Roman", Times, serif;
      line-height: 1.15;
      white-space: nowrap;
    }
    #legendOverlay .mi{ font-style: italic; }
    #legendOverlay .mo{ padding: 0 0.08em; }
    #legendOverlay .msub sub,
    #legendOverlay .msup sup{
      font-size: 0.78em;
      line-height: 0;
      position: relative;
      vertical-align: baseline;
    }
    #legendOverlay .msup sup{ top: -0.55em; }
    #legendOverlay .msub sub{ bottom: -0.15em; }
    #legendOverlay .mfunc{ font-style: normal; }


    .view-panels{
      display:grid;
      gap:10px;
      margin:12px 0;
    }
    .view-item{
      display:grid;
      gap:8px;
    }
    .settings-panel{
      display:none;
      gap:10px;
      padding:12px;
      border:1px solid #dbe3ee;
      border-radius:14px;
      background:#f8fafc;
      box-shadow:0 2px 8px rgba(15,23,42,.06);
    }
    .settings-panel.open{
      display:grid;
    }
    .settings-panel .palette{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .swatch{
      width:28px;
      height:28px;
      border-radius:8px;
      border:2px solid transparent;
      cursor:pointer;
      padding:0;
      min-width:28px;
    }
    .swatch.active{
      border-color:#0f172a;
      box-shadow:0 0 0 2px rgba(15,23,42,.08);
    }
    .style-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }


    .tabs{
      grid-template-columns:repeat(4,1fr);
    }
    .measure-label{
      background:rgba(255,255,255,0.78);
      border-radius:8px;
      padding:2px 6px;
    }

</style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="panel">
        <h1>Bildanalyse mit Fit-Overlay</h1>

        <div id="dropzone" class="dropzone">
          <p>Bild hierher ziehen oder per Explorer auswählen</p>
          <button id="browseBtn" type="button">Bild öffnen</button>
          <input id="fileInput" type="file" accept="image/*" hidden>
        </div>

        <div class="tabs">
          <button class="tabbtn active" data-tab="axes">Achsen</button>
          <button class="tabbtn" data-tab="fit">Fit</button>
          <button class="tabbtn" data-tab="measure">Messen</button>
          <button class="tabbtn" data-tab="view">Ansicht</button>
        </div>

        <div id="tab-axes" class="tab active">
          <h2>Koordinatensystem</h2>
          <div class="row">
            <div>
              <label for="xRefValue">Wert des x-Referenzpunkts</label>
              <input id="xRefValue" type="number" step="any" value="1">
            </div>
            <div>
              <label for="yRefValue">Wert des y-Referenzpunkts</label>
              <input id="yRefValue" type="number" step="any" value="1">
            </div>
            <button id="resetAxesBtn" class="secondary" type="button">Achsen zurücksetzen</button>
          </div>
          <div class="hint">
            Grünen Punkt ziehen: Ursprung<br>
            Blauen Punkt ziehen: x-Skalierung<br>
            Violetten Punkt ziehen: y-Skalierung
          </div>
        </div>

        <div id="tab-fit" class="tab">
          <h2>Fit-Overlay</h2>
          <div class="row">
            <div>
              <label for="fitType">Fit-Typ</label>
              <select id="fitType">
                <option value="linear">Linear</option>
                <option value="quadratic">Quadratisch</option>
                <option value="exponential">Exponentiell</option>
                <option value="sine">Sinus</option>
                <option value="cosine">Kosinus</option>
                <option value="expsin">Exp. · Sinus</option>
                <option value="expcos">Exp. · Kosinus</option>
                <option value="generalsine">Allg. Sinus</option>
              </select>
            </div>
          </div>
          <div id="formulaBox" class="formula"></div>
          
        </div>


        <div id="tab-measure" class="tab">
          <h2>Messen</h2>
          <div class="row">
            <div>
              <label for="measureTool">Werkzeug</label>
              <select id="measureTool">
                <option value="point">Punkt ablesen</option>
                <option value="segment">Strecke abmessen</option>
                <option value="angle">Winkel abmessen</option>
                <option value="polygon">Fläche messen</option>
              </select>
            </div>
          </div>

          <div id="measurePointControls" class="row">
            <button id="stampPointBtn" class="secondary" type="button">Punkt stempeln</button>
            <button id="deleteStampBtn" class="secondary" type="button">Ausgewählten Stempel löschen</button>
          </div>

          <div id="measureSegmentControls" class="row" style="display:none">
            <button id="stampSegmentBtn" class="secondary" type="button">Strecke stempeln</button>
            <div class="twocol">
              <div>
                <label for="segmentColor">Farbe</label>
                <input id="segmentColor" type="color" value="#16a34a">
              </div>
              <div>
                <label for="segmentWidth">Linienstärke</label>
                <input id="segmentWidth" type="range" min="1" max="8" step="0.5" value="3">
              </div>
            </div>
            <div>
              <label for="segmentLineType">Linientyp</label>
              <select id="segmentLineType">
                <option value="solid">Durchgezogen</option>
                <option value="dashed">Gestrichelt</option>
                <option value="dotted">Gepunktet</option>
              </select>
            </div>
          </div>

          <div id="measureAngleControls" class="row" style="display:none">
            <button id="stampAngleBtn" class="secondary" type="button">Winkel stempeln</button>
          </div>

          <div id="measurePolygonControls" class="row" style="display:none">

            <button id="addPolygonBtn" class="secondary" type="button">Polygon hinzufügen</button>
            <button id="deletePolygonBtn" class="secondary" type="button">Ausgewähltes Polygon löschen</button>
          </div>

          <div id="measurePolygonStyleControls" class="row" style="display:none">
            <div class="twocol">
              <div>
                <label for="polygonStrokeColor">Rahmenfarbe</label>
                <input id="polygonStrokeColor" type="color" value="#f97316">
              </div>
              <div>
                <label for="polygonFillColor">Füllfarbe</label>
                <input id="polygonFillColor" type="color" value="#f97316">
              </div>
            </div>
            <div class="twocol">
              <div>
                <label for="polygonStrokeWidth">Linienstärke</label>
                <input id="polygonStrokeWidth" type="range" min="1" max="8" step="0.5" value="2">
              </div>
              <div>
                <label for="polygonFillOpacity">Füll-Deckkraft</label>
                <input id="polygonFillOpacity" type="range" min="0.05" max="0.9" step="0.05" value="0.25">
              </div>
            </div>
          </div>
        </div>

        <div id="tab-view" class="tab">
          <h2>Ansicht</h2>
          <div class="view-panels">
            <div class="view-item">
              <button id="fitSettingsBtn" class="secondary" type="button">Fit einstellen</button>
              <div id="fitSettingsPanel" class="settings-panel"></div>
            </div>
            <div class="view-item">
              <button id="gridSettingsBtn" class="secondary" type="button">Raster einstellen</button>
              <div id="gridSettingsPanel" class="settings-panel"></div>
            </div>
            <div class="view-item">
              <button id="axesSettingsBtn" class="secondary" type="button">Achsen einstellen</button>
              <div id="axesSettingsPanel" class="settings-panel"></div>
            </div>
            <div class="view-item">
              <button id="legendSettingsBtn" class="secondary" type="button">Legende einstellen</button>
              <div id="legendSettingsPanel" class="settings-panel"></div>
            </div>
            <button id="exportBtn" class="secondary" type="button">Bild exportieren</button>
          </div>
          <div class="hint">
            <div><strong>Aktuelle Skalierung</strong></div>
            <div id="scaleInfoX">x: –</div>
            <div id="scaleInfoY">y: –</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="canvas-wrap">
        <div class="canvas-stack">
          <canvas id="canvas" width="900" height="600"></canvas>
          <div id="legendOverlay"></div>
        </div>
      </div>
    </div>

    <div class="card slider-bar">
      <div class="panel">
        <div id="paramContainer"></div>
      </div>
    </div>
  </div>

  <script>
    const FIT_DEFS = {
      linear: {
        label: "Linear",
        formula: "y = m·x + n",
        params: [
          { key: "m", label: "m", defaultValue: 0.5, min: 0, max: 1 },
          { key: "n", label: "n", defaultValue: 0.5, min: 0, max: 1 }
        ]
      },
      quadratic: {
        label: "Quadratisch",
        formula: "y = a·x² + b·x + c",
        params: [
          { key: "a", label: "a", defaultValue: 0.2, min: 0, max: 1 },
          { key: "b", label: "b", defaultValue: 0.5, min: 0, max: 1 },
          { key: "c", label: "c", defaultValue: 0.3, min: 0, max: 1 }
        ]
      },
      exponential: {
        label: "Exponentiell",
        formula: "y = a·e^(b·x) + c",
        params: [
          { key: "a", label: "a", defaultValue: 0.5, min: 0, max: 1 },
          { key: "b", label: "b", defaultValue: 0.4, min: 0, max: 1 },
          { key: "c", label: "c", defaultValue: 0.2, min: 0, max: 1 }
        ]
      },
      sine: {
        label: "Sinus",
        formula: "y = a·sin(ω·x)",
        params: [
          { key: "a", label: "a", defaultValue: 0.5, min: 0, max: 1 },
          { key: "w", label: "ω", defaultValue: 0.5, min: 0, max: 1 }
        ]
      },
      cosine: {
        label: "Kosinus",
        formula: "y = a·cos(ω·x)",
        params: [
          { key: "a", label: "a", defaultValue: 0.5, min: 0, max: 1 },
          { key: "w", label: "ω", defaultValue: 0.5, min: 0, max: 1 }
        ]
      },
      expsin: {
        label: "Exp. · Sinus",
        formula: "y = a·e^(-b·x)·sin(ω·x)",
        params: [
          { key: "a", label: "a", defaultValue: 0.5, min: 0, max: 1 },
          { key: "b", label: "b", defaultValue: 0.3, min: 0, max: 1 },
          { key: "w", label: "ω", defaultValue: 0.5, min: 0, max: 1 }
        ]
      },
      expcos: {
        label: "Exp. · Kosinus",
        formula: "y = a·e^(-b·x)·cos(ω·x)",
        params: [
          { key: "a", label: "a", defaultValue: 0.5, min: 0, max: 1 },
          { key: "b", label: "b", defaultValue: 0.3, min: 0, max: 1 },
          { key: "w", label: "ω", defaultValue: 0.5, min: 0, max: 1 }
        ]
      },
      generalsine: {
        label: "Allg. Sinus",
        formula: "y = a·sin(ω·x + φ₀)",
        params: [
          { key: "a", label: "a", defaultValue: 0.5, min: 0, max: 1 },
          { key: "w", label: "ω", defaultValue: 0.5, min: 0, max: 1 },
          { key: "phi0", label: "φ₀", defaultValue: 0.0, min: 0, max: 1 }
        ]
      }
    };

    const state = {
      image: null,
      imageSrc: null,
      canvasWidth: 900,
      canvasHeight: 600,
      origin: { x: 220, y: 220 },
      xPoint: { x: 360, y: 220, value: 1 },
      yPoint: { x: 220, y: 80, value: 1 },
      fitType: "linear",
      paramState: {},
      showFit: true,
      showGrid: true,
      showAxes: true,
      activeDrag: null,
      handleRadius: 8,
      showHandles: true,
      showLegend: true,
      legendPos: { x: 750, y: 24 },
      legendDragOffset: { x: 0, y: 0 },
      openPanel: null,
      styles: {
        fit: { color: "#2563eb", width: 3, lineType: "solid", opacity: 1 },
        grid: { color: "#3b82f6", width: 1, lineType: "solid", opacity: 0.32 },
        axes: { color: "#dc2626", width: 2, lineType: "solid", opacity: 1, ticks: true },
        legend: { fontSize: 12 }
      }
    };

    const canvas = document.getElementById("canvas");
    const legendOverlay = document.getElementById("legendOverlay");
    const ctx = canvas.getContext("2d");
    const fileInput = document.getElementById("fileInput");
    const dropzone = document.getElementById("dropzone");
    const browseBtn = document.getElementById("browseBtn");
    const xRefValue = document.getElementById("xRefValue");
    const yRefValue = document.getElementById("yRefValue");
    const resetAxesBtn = document.getElementById("resetAxesBtn");
    const fitTypeSelect = document.getElementById("fitType");
    const formulaBox = document.getElementById("formulaBox");
    const paramContainer = document.getElementById("paramContainer");
    const fitSettingsBtn = document.getElementById("fitSettingsBtn");
    const gridSettingsBtn = document.getElementById("gridSettingsBtn");
    const axesSettingsBtn = document.getElementById("axesSettingsBtn");
    const legendSettingsBtn = document.getElementById("legendSettingsBtn");
    const fitSettingsPanel = document.getElementById("fitSettingsPanel");
    const gridSettingsPanel = document.getElementById("gridSettingsPanel");
    const axesSettingsPanel = document.getElementById("axesSettingsPanel");
    const legendSettingsPanel = document.getElementById("legendSettingsPanel");
    const exportBtn = document.getElementById("exportBtn");
    const scaleInfoX = document.getElementById("scaleInfoX");
    const scaleInfoY = document.getElementById("scaleInfoY");

    function clamp(v, min, max){
      return Math.max(min, Math.min(max, v));
    }

    function distance(a, b){
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function buildDefaultParamState(type){
      const obj = {};
      for(const p of FIT_DEFS[type].params){
        obj[p.key] = { value: p.defaultValue, min: p.min, max: p.max };
      }
      return obj;
    }

    function xPixelsPerUnit(){
      const d = distance(state.origin, state.xPoint);
      const value = Number(state.xPoint.value) || 1;
      return d / value;
    }

    function yPixelsPerUnit(){
      const d = distance(state.origin, state.yPoint);
      const value = Number(state.yPoint.value) || 1;
      return d / value;
    }

    function displayScale(){
      const rect = canvas.getBoundingClientRect();
      if(!rect.width || !rect.height) return { sx: 1, sy: 1 };
      return {
        sx: canvas.width / rect.width,
        sy: canvas.height / rect.height
      };
    }

    function fontPx(screenPx){
      const s = displayScale();
      return Math.max(1, screenPx * s.sy);
    }

    function linePx(screenPx){
      const s = displayScale();
      return Math.max(1, screenPx * ((s.sx + s.sy) / 2));
    }

    function canvasToCssX(x){
      const rect = canvas.getBoundingClientRect();
      return rect.width ? x / (canvas.width / rect.width) : x;
    }

    function canvasToCssY(y){
      const rect = canvas.getBoundingClientRect();
      return rect.height ? y / (canvas.height / rect.height) : y;
    }

    function cssToCanvasDX(dx){
      const rect = canvas.getBoundingClientRect();
      return rect.width ? dx * (canvas.width / rect.width) : dx;
    }

    function cssToCanvasDY(dy){
      const rect = canvas.getBoundingClientRect();
      return rect.height ? dy * (canvas.height / rect.height) : dy;
    }

    function rgbaFromHex(hex, opacity){
      const c = (hex || "#000000").replace("#", "");
      const full = c.length === 3 ? c.split("").map(ch => ch + ch).join("") : c;
      const n = parseInt(full, 16);
      const r = (n >> 16) & 255;
      const g = (n >> 8) & 255;
      const b = n & 255;
      return `rgba(${r},${g},${b},${opacity})`;
    }

    function applyLineStyle(targetCtx, styleObj){
      targetCtx.setLineDash([]);
      if(styleObj.lineType === "dashed") targetCtx.setLineDash([10, 6]);
      if(styleObj.lineType === "dotted") targetCtx.setLineDash([2, 6]);
    }

    function paletteColors(){
      return ["#dc2626", "#2563eb", "#16a34a", "#f97316", "#7c3aed", "#0f172a"];
    }

    function buildPaletteHTML(kind){
      return `<div class="palette">` + paletteColors().map(color => `
        <button type="button" class="swatch ${state.styles[kind].color === color ? "active" : ""}" style="background:${color}" data-color-target="${kind}" data-color-value="${color}"></button>
      `).join("") + `</div>`;
    }

    function buildLineTypeSelect(kind){
      const current = state.styles[kind].lineType;
      return `
        <select data-linetype-target="${kind}">
          <option value="solid" ${current === "solid" ? "selected" : ""}>Durchgezogen</option>
          <option value="dashed" ${current === "dashed" ? "selected" : ""}>Gestrichelt</option>
          <option value="dotted" ${current === "dotted" ? "selected" : ""}>Gepunktet</option>
        </select>
      `;
    }

    function buildLinePanel(kind, visible){
      return `
        <label><input type="checkbox" data-visible-target="${kind}" ${visible ? "checked" : ""}> Sichtbar</label>
        <div>
          <label>Farbe</label>
          ${buildPaletteHTML(kind)}
        </div>
        <div class="style-row">
          <div>
            <label>Linienstärke</label>
            <input type="range" min="1" max="8" step="0.5" value="${state.styles[kind].width}" data-width-target="${kind}">
          </div>
          <div>
            <label>Deckkraft</label>

          </div>
        </div>
        <div>
          <label>Linientyp</label>

    function toggleSettingsPanel(name){
      state.openPanel = state.openPanel === name ? null : name;
      renderSettingsPanels();
    }

    function niceStep(rawStep){
      if(rawStep <= 0 || !Number.isFinite(rawStep)) return 1;
      const exp = Math.floor(Math.log10(rawStep));
      const f = rawStep / Math.pow(10, exp);
      let niceF;
      if(f <= 1) niceF = 1;
      else if(f <= 2) niceF = 2;
      else if(f <= 5) niceF = 5;
      else niceF = 10;
      return niceF * Math.pow(10, exp);
    }

    function decimalsForStep(step){
      if(!Number.isFinite(step) || step <= 0) return 0;
      return Math.max(0, Math.min(6, Math.ceil(-Math.log10(step))));
    }

    function formatTickValue(v, step){
      const d = decimalsForStep(step);
      const rounded = Number(v.toFixed(d));
      return String(rounded);
    }

    function axisStep(pixelsPerUnit){
      const minPx = 55;
      const raw = minPx / pixelsPerUnit;
      return niceStep(raw);
    }

    function handleRadiusPx(screenPx){
      const s = displayScale();
      return Math.max(1, screenPx * ((s.sx + s.sy) / 2));
    }

    function hitRadiusPx(screenPx){
      const s = displayScale();
      return Math.max(1, screenPx * ((s.sx + s.sy) / 2));
    }

    function evaluateFit(x){
      const p = state.paramState;
      switch(state.fitType){
        case "linear": return p.m.value * x + p.n.value;
        case "quadratic": return p.a.value * x*x + p.b.value * x + p.c.value;
        case "exponential": return p.a.value * Math.exp(p.b.value * x) + p.c.value;
        case "sine": return p.a.value * Math.sin(p.w.value * x);
        case "cosine": return p.a.value * Math.cos(p.w.value * x);
        case "expsin": return p.a.value * Math.exp(-p.b.value * x) * Math.sin(p.w.value * x);
        case "expcos": return p.a.value * Math.exp(-p.b.value * x) * Math.cos(p.w.value * x);
        case "generalsine": return p.a.value * Math.sin(p.w.value * x + p.phi0.value);
        default: return 0;
      }
    }


    function roundSig(value, sig = 2){
      if(!Number.isFinite(value) || value === 0) return 0;
      return Number(value.toPrecision(sig));
    }

    function fmtSig(value, sig = 2){
      const v = roundSig(value, sig);
      if(!Number.isFinite(v)) return "0";
      return String(v);
    }

    function currentFormulaText(){
      const p = state.paramState;
      switch(state.fitType){
        case "linear":
          return `y = ${fmtSig(p.m.value)}x ${p.n.value >= 0 ? "+" : "−"} ${fmtSig(Math.abs(p.n.value))}`;
        case "quadratic":
          return `y = ${fmtSig(p.a.value)}x² ${p.b.value >= 0 ? "+" : "−"} ${fmtSig(Math.abs(p.b.value))}x ${p.c.value >= 0 ? "+" : "−"} ${fmtSig(Math.abs(p.c.value))}`;
        case "exponential":
          return `y = ${fmtSig(p.a.value)}e^(${fmtSig(p.b.value)}x) ${p.c.value >= 0 ? "+" : "−"} ${fmtSig(Math.abs(p.c.value))}`;
        case "sine":
          return `y = ${fmtSig(p.a.value)} sin(${fmtSig(p.w.value)}x)`;
        case "cosine":
          return `y = ${fmtSig(p.a.value)} cos(${fmtSig(p.w.value)}x)`;
        case "expsin":
          return `y = ${fmtSig(p.a.value)} e^(−${fmtSig(p.b.value)}x) sin(${fmtSig(p.w.value)}x)`;
        case "expcos":
          return `y = ${fmtSig(p.a.value)} e^(−${fmtSig(p.b.value)}x) cos(${fmtSig(p.w.value)}x)`;
        case "generalsine":
          return `y = ${fmtSig(p.a.value)} sin(${fmtSig(p.w.value)}x ${p.phi0.value >= 0 ? "+" : "−"} ${fmtSig(Math.abs(p.phi0.value))})`;
        default:
          return "";
      }
    }

    function htmlNum(v){
      return String(fmtSig(v)).replace('-', '−');
    }

    function termSign(v){
      return v >= 0 ? '+' : '−';
    }

    function currentFormulaHTML(){
      const p = state.paramState;
      switch(state.fitType){
        case "linear":
          return `<span class="mi">y</span><span class="mo">=</span>${htmlNum(p.m.value)}<span class="mi">x</span><span class="mo">${termSign(p.n.value)}</span>${htmlNum(Math.abs(p.n.value))}`;
        case "quadratic":
          return `<span class="mi">y</span><span class="mo">=</span>${htmlNum(p.a.value)}<span class="msup"><span class="mi">x</span><sup>2</sup></span><span class="mo">${termSign(p.b.value)}</span>${htmlNum(Math.abs(p.b.value))}<span class="mi">x</span><span class="mo">${termSign(p.c.value)}</span>${htmlNum(Math.abs(p.c.value))}`;
        case "exponential":
          return `<span class="mi">y</span><span class="mo">=</span>${htmlNum(p.a.value)}<span class="msup"><span class="mi">e</span><sup>${htmlNum(p.b.value)}<span class="mi">x</span></sup></span><span class="mo">${termSign(p.c.value)}</span>${htmlNum(Math.abs(p.c.value))}`;
        case "sine":
          return `<span class="mi">y</span><span class="mo">=</span>${htmlNum(p.a.value)} <span class="mfunc">sin</span>(${htmlNum(p.w.value)}<span class="mi">x</span>)`;
        case "cosine":
          return `<span class="mi">y</span><span class="mo">=</span>${htmlNum(p.a.value)} <span class="mfunc">cos</span>(${htmlNum(p.w.value)}<span class="mi">x</span>)`;
        case "expsin":
          return `<span class="mi">y</span><span class="mo">=</span>${htmlNum(p.a.value)} <span class="msup"><span class="mi">e</span><sup>−${htmlNum(p.b.value)}<span class="mi">x</span></sup></span> <span class="mfunc">sin</span>(${htmlNum(p.w.value)}<span class="mi">x</span>)`;
        case "expcos":
          return `<span class="mi">y</span><span class="mo">=</span>${htmlNum(p.a.value)} <span class="msup"><span class="mi">e</span><sup>−${htmlNum(p.b.value)}<span class="mi">x</span></sup></span> <span class="mfunc">cos</span>(${htmlNum(p.w.value)}<span class="mi">x</span>)`;
        case "generalsine":
          return `<span class="mi">y</span><span class="mo">=</span>${htmlNum(p.a.value)} <span class="mfunc">sin</span>(${htmlNum(p.w.value)}<span class="mi">x</span> <span class="mo">${termSign(p.phi0.value)}</span> ${htmlNum(Math.abs(p.phi0.value))})`;
        default:
          return "";
      }
    }

    function currentFormulaExportText(){
      const p = state.paramState;
      switch(state.fitType){
        case "linear":
          return `y = ${fmtSig(p.m.value)}x ${p.n.value >= 0 ? "+" : "−"} ${fmtSig(Math.abs(p.n.value))}`;
        case "quadratic":
          return `y = ${fmtSig(p.a.value)}x² ${p.b.value >= 0 ? "+" : "−"} ${fmtSig(Math.abs(p.b.value))}x ${p.c.value >= 0 ? "+" : "−"} ${fmtSig(Math.abs(p.c.value))}`;
        case "exponential":
          return `y = ${fmtSig(p.a.value)}e^(${fmtSig(p.b.value)}x) ${p.c.value >= 0 ? "+" : "−"} ${fmtSig(Math.abs(p.c.value))}`;
        case "sine":
          return `y = ${fmtSig(p.a.value)} sin(${fmtSig(p.w.value)}x)`;
        case "cosine":
          return `y = ${fmtSig(p.a.value)} cos(${fmtSig(p.w.value)}x)`;
        case "expsin":
          return `y = ${fmtSig(p.a.value)} e^(−${fmtSig(p.b.value)}x) sin(${fmtSig(p.w.value)}x)`;
        case "expcos":
          return `y = ${fmtSig(p.a.value)} e^(−${fmtSig(p.b.value)}x) cos(${fmtSig(p.w.value)}x)`;
        case "generalsine":
          return `y = ${fmtSig(p.a.value)} sin(${fmtSig(p.w.value)}x ${p.phi0.value >= 0 ? "+" : "−"} ${fmtSig(Math.abs(p.phi0.value))})`;
