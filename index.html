    function updateLegendOverlay(){
      if(!state.showFit || !state.showLegend){
        legendOverlay.style.display = "none";
        return;
      }
      legendOverlay.style.display = "block";
      legendOverlay.innerHTML = currentFormulaHTML();
      legendOverlay.style.fontSize = `${canvasToCssY(fontPx(state.styles.legend.fontSize))}px`;
      legendOverlay.style.borderColor = state.styles.fit.color;
      clampLegendIntoCanvas();
      legendOverlay.style.left = `${canvasToCssX(state.legendPos.x)}px`;
      legendOverlay.style.top = `${canvasToCssY(state.legendPos.y)}px`;
    }

    function legendRect(){
      return {
        x: state.legendPos.x,
        y: state.legendPos.y,
        width: cssToCanvasDX(legendOverlay.offsetWidth || 120),
        height: cssToCanvasDY(legendOverlay.offsetHeight || 40)
      };
    }

    function clampLegendIntoCanvas(){
      const r = legendRect();
      state.legendPos.x = Math.max(0, Math.min(state.legendPos.x, canvas.width - r.width));
      state.legendPos.y = Math.max(0, Math.min(state.legendPos.y, canvas.height - r.height));
    }

    function drawLegend(){
      updateLegendOverlay();
    }

    function drawExportLegend(exportCtx, exportWidth, exportHeight){
      if(!state.showFit || !state.showLegend) return;

      const baseFont = fontPx(state.styles.legend.fontSize);
      const superFont = baseFont * 0.78;
      const padX = fontPx(10);
      const padY = fontPx(8);
      const radius = fontPx(8);

      function setBaseFont(){
        exportCtx.font = `italic ${baseFont}px "Times New Roman"`;
      }
      function setSuperFont(){
        exportCtx.font = `italic ${superFont}px "Times New Roman"`;
      }
      function measureBase(text){
        setBaseFont();
        return exportCtx.measureText(text).width;
      }
      function measureSuper(text){
        setSuperFont();
        return exportCtx.measureText(text).width;
      }

      function buildLegendOps(){
        const p = state.paramState;
        const ops = [];
        const add = (text, kind="base") => ops.push({text, kind});
        const num = (v) => String(fmtSig(v)).replace('-', '−');
        const sign = (v) => v >= 0 ? ' + ' : ' − ';

        switch(state.fitType){
          case "linear":
            add(`y = ${num(p.m.value)}x${sign(p.n.value)}${num(Math.abs(p.n.value))}`);
            break;
          case "quadratic":
            add(`y = ${num(p.a.value)}`);
            add(`x`, "base");
            add(`2`, "super");
            add(`${sign(p.b.value)}${num(Math.abs(p.b.value))}x${sign(p.c.value)}${num(Math.abs(p.c.value))}`);
            break;
          case "exponential":
            add(`y = ${num(p.a.value)}e`, "base");
            add(`${num(p.b.value)}x`, "super");
            add(`${sign(p.c.value)}${num(Math.abs(p.c.value))}`);
            break;
          case "sine":
            add(`y = ${num(p.a.value)} sin(${num(p.w.value)}x)`);
            break;
          case "cosine":
            add(`y = ${num(p.a.value)} cos(${num(p.w.value)}x)`);
            break;
          case "expsin":
            add(`y = ${num(p.a.value)} e`, "base");
            add(`−${num(p.b.value)}x`, "super");
            add(` sin(${num(p.w.value)}x)`);
            break;
          case "expcos":
            add(`y = ${num(p.a.value)} e`, "base");
            add(`−${num(p.b.value)}x`, "super");
            add(` cos(${num(p.w.value)}x)`);
            break;
          case "generalsine":
            add(`y = ${num(p.a.value)} sin(${num(p.w.value)}x${sign(p.phi0.value)}${num(Math.abs(p.phi0.value))})`);
            break;
          default:
            add(currentFormulaExportText());
        }
        return ops;
      }

      const ops = buildLegendOps();

      let textWidth = 0;
      for(const op of ops){
        textWidth += op.kind === "super" ? measureSuper(op.text) : measureBase(op.text);
      }
      const width = textWidth + 2 * padX;
      const height = baseFont + 2 * padY + fontPx(10);
      const x = Math.max(0, Math.min(state.legendPos.x, exportWidth - width));
      const y = Math.max(0, Math.min(state.legendPos.y, exportHeight - height));

      exportCtx.save();
      exportCtx.fillStyle = "rgba(255,255,255,0.88)";
      exportCtx.strokeStyle = state.styles.fit.color;
      exportCtx.lineWidth = linePx(1.5);
      exportCtx.beginPath();
      exportCtx.moveTo(x + radius, y);
      exportCtx.lineTo(x + width - radius, y);
      exportCtx.quadraticCurveTo(x + width, y, x + width, y + radius);
      exportCtx.lineTo(x + width, y + height - radius);
      exportCtx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      exportCtx.lineTo(x + radius, y + height);
      exportCtx.quadraticCurveTo(x, y + height, x, y + height - radius);
      exportCtx.lineTo(x, y + radius);
      exportCtx.quadraticCurveTo(x, y, x + radius, y);
      exportCtx.closePath();
      exportCtx.fill();
      exportCtx.stroke();

      exportCtx.fillStyle = "#0f172a";
      let cursorX = x + padX;
      const baseY = y + padY + baseFont;
      const superY = baseY - baseFont * 0.55;

      for(const op of ops){
        if(op.kind === "super"){
          setSuperFont();
          exportCtx.fillText(op.text, cursorX, superY);
          cursorX += exportCtx.measureText(op.text).width;
        } else {
          setBaseFont();
          exportCtx.fillText(op.text, cursorX, baseY);
          cursorX += exportCtx.measureText(op.text).width;
        }
      }
      exportCtx.restore();
    }

    function initParams(){
      state.paramState = buildDefaultParamState(state.fitType);
      renderParamControls();
      renderSettingsPanels();
      render();
    }

    function renderParamControls(){
      formulaBox.textContent = "Formel: " + FIT_DEFS[state.fitType].formula;
      paramContainer.innerHTML = "";

      for(const p of FIT_DEFS[state.fitType].params){
        const s = state.paramState[p.key];
        const card = document.createElement("div");
        card.className = "param-card";

        const head = document.createElement("div");
        head.className = "param-head";
        head.innerHTML = `<strong>${p.label}</strong><span id="val-${p.key}">${Number(s.value).toFixed(3)}</span>`;
        card.appendChild(head);

        const slider = document.createElement("input");
        slider.type = "range";
        slider.min = String(s.min);
        slider.max = String(s.max);
        slider.step = String(((s.max - s.min) / 500) || 0.001);
        slider.value = String(s.value);
        slider.addEventListener("input", () => {
          state.paramState[p.key].value = Number(slider.value);
          document.getElementById(`val-${p.key}`).textContent = Number(slider.value).toFixed(3);
          render();
        });
        card.appendChild(slider);

        const grid = document.createElement("div");
        grid.className = "twocol";
        grid.innerHTML = `
          <div>
            <label>Min</label>
            <input type="number" step="any" value="${s.min}">
          </div>
          <div>
            <label>Max</label>
            <input type="number" step="any" value="${s.max}">
          </div>
        `;
        const [minInput, maxInput] = grid.querySelectorAll("input");

        minInput.addEventListener("change", () => {
          let v = Number(minInput.value);
          if(!Number.isFinite(v)) v = 0;
          state.paramState[p.key].min = v;
          if(state.paramState[p.key].value < v) state.paramState[p.key].value = v;
          if(state.paramState[p.key].max < v) state.paramState[p.key].max = v;
          renderParamControls();
          render();
        });

        maxInput.addEventListener("change", () => {
          let v = Number(maxInput.value);
          if(!Number.isFinite(v)) v = 1;
          state.paramState[p.key].max = v;
          if(state.paramState[p.key].value > v) state.paramState[p.key].value = v;
          if(state.paramState[p.key].min > v) state.paramState[p.key].min = v;
          renderParamControls();
          render();
        });

        card.appendChild(grid);
        paramContainer.appendChild(card);
      }
    }

    function setCanvasSize(w, h){
      state.canvasWidth = w;
      state.canvasHeight = h;
      canvas.width = w;
      canvas.height = h;
    }

    function setDefaultAxesForImage(){
      const w = state.canvasWidth;
      const h = state.canvasHeight;
      const ox = w * 0.2;
      const oy = h * 0.8;
      state.origin = { x: ox, y: oy };
      state.xPoint = { x: ox + Math.min(180, w * 0.2), y: oy, value: Number(xRefValue.value) || 1 };
      state.yPoint = { x: ox, y: oy - Math.min(180, h * 0.2), value: Number(yRefValue.value) || 1 };
    }

    function loadImageFromFile(file){
      if(!file || !file.type.startsWith("image/")) return;
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          state.image = img;
          state.imageSrc = reader.result;
          setCanvasSize(img.width, img.height);
          setDefaultAxesForImage();
          state.legendPos = { x: Math.max(24, img.width - 150), y: 24 };
          clampLegendIntoCanvas();
          render();
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    function getMousePos(evt){
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: (evt.clientX - rect.left) * scaleX,
        y: (evt.clientY - rect.top) * scaleY
      };
    }

    function pickHandle(p){
      const hit = hitRadiusPx(22);
      if(distance(p, state.origin) < hit) return "origin";
      if(distance(p, state.xPoint) < hit) return "xPoint";
      if(distance(p, state.yPoint) < hit) return "yPoint";
      return null;
    }


    legendOverlay.addEventListener("pointerdown", (e) => {
      const legendBox = legendOverlay.getBoundingClientRect();
      state.activeDrag = "legend";
      state.legendDragOffset = {
        x: cssToCanvasDX(e.clientX - legendBox.left),
        y: cssToCanvasDY(e.clientY - legendBox.top)
      };
      legendOverlay.setPointerCapture?.(e.pointerId);
      e.preventDefault();
      e.stopPropagation();
    });

    legendOverlay.addEventListener("pointermove", (e) => {
      if(state.activeDrag !== "legend") return;
      const rect = canvas.getBoundingClientRect();
      state.legendPos = {
        x: cssToCanvasDX(e.clientX - rect.left) - state.legendDragOffset.x,
        y: cssToCanvasDY(e.clientY - rect.top) - state.legendDragOffset.y
      };
      clampLegendIntoCanvas();
      updateLegendOverlay();
      e.preventDefault();
      e.stopPropagation();
    });

    function drawHandle(point, label, color){
      const r = handleRadiusPx(8);
      ctx.save();
      ctx.fillStyle = color;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = linePx(2);
      ctx.beginPath();
      ctx.arc(point.x, point.y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      if(label){
        ctx.fillStyle = "#0f172a";
        ctx.font = `${fontPx(12)}px Arial`;
        ctx.fillText(label, point.x + handleRadiusPx(12), point.y - handleRadiusPx(10));
      }
      ctx.restore();
    }

    function drawGrid(){
      const xppu = xPixelsPerUnit();
      const yppu = yPixelsPerUnit();
      if(xppu <= 0 || yppu <= 0 || !state.showGrid) return;

      const xStep = axisStep(xppu);
      const yStep = axisStep(yppu);
      const xStepPx = xStep * xppu;
      const yStepPx = yStep * yppu;

      ctx.save();
      ctx.strokeStyle = rgbaFromHex(state.styles.grid.color, state.styles.grid.opacity);
      ctx.lineWidth = linePx(state.styles.grid.width);
      applyLineStyle(ctx, state.styles.grid);

      for(let x = state.origin.x; x <= canvas.width; x += xStepPx){
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for(let x = state.origin.x - xStepPx; x >= 0; x -= xStepPx){
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for(let y = state.origin.y; y <= canvas.height; y += yStepPx){
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      for(let y = state.origin.y - yStepPx; y >= 0; y -= yStepPx){
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawAxes(){
      const xppu = xPixelsPerUnit();
      const yppu = yPixelsPerUnit();
      if(!state.showAxes) return;

      const xStep = axisStep(xppu);
      const yStep = axisStep(yppu);
      const xStepPx = xStep * xppu;
      const yStepPx = yStep * yppu;
      const axisColor = rgbaFromHex(state.styles.axes.color, state.styles.axes.opacity);

      ctx.save();
      ctx.strokeStyle = axisColor;
      ctx.fillStyle = axisColor;
      ctx.lineWidth = linePx(state.styles.axes.width);
      applyLineStyle(ctx, state.styles.axes);

      ctx.beginPath();
      ctx.moveTo(0, state.origin.y);
      ctx.lineTo(canvas.width, state.origin.y);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(state.origin.x, 0);
      ctx.lineTo(state.origin.x, canvas.height);
      ctx.stroke();

      if(state.styles.axes.ticks){
        ctx.setLineDash([]);
        const tickLen = fontPx(7);
        for(let x = state.origin.x; x <= canvas.width; x += xStepPx){
          ctx.beginPath();
          ctx.moveTo(x, state.origin.y - tickLen / 2);
          ctx.lineTo(x, state.origin.y + tickLen / 2);
          ctx.stroke();
        }
        for(let x = state.origin.x - xStepPx; x >= 0; x -= xStepPx){
          ctx.beginPath();
          ctx.moveTo(x, state.origin.y - tickLen / 2);
          ctx.lineTo(x, state.origin.y + tickLen / 2);
          ctx.stroke();
        }
        for(let y = state.origin.y; y >= 0; y -= yStepPx){
          ctx.beginPath();
          ctx.moveTo(state.origin.x - tickLen / 2, y);
          ctx.lineTo(state.origin.x + tickLen / 2, y);
          ctx.stroke();
        }
        for(let y = state.origin.y + yStepPx; y <= canvas.height; y += yStepPx){
          ctx.beginPath();
          ctx.moveTo(state.origin.x - tickLen / 2, y);
          ctx.lineTo(state.origin.x + tickLen / 2, y);
          ctx.stroke();
        }
      }

      ctx.fillStyle = axisColor;
      ctx.font = `${fontPx(12)}px Arial`;
      ctx.fillText("x", canvas.width - fontPx(18), state.origin.y - fontPx(10));
      ctx.fillText("y", state.origin.x + fontPx(10), fontPx(18));

      for(let x = state.origin.x, v = 0; x <= canvas.width; x += xStepPx, v += xStep){
        ctx.fillText(formatTickValue(v, xStep), x + fontPx(2), state.origin.y + fontPx(18));
      }
      for(let x = state.origin.x - xStepPx, v = -xStep; x >= 0; x -= xStepPx, v -= xStep){
        ctx.fillText(formatTickValue(v, xStep), x + fontPx(2), state.origin.y + fontPx(18));
      }

      for(let y = state.origin.y, v = 0; y >= 0; y -= yStepPx, v += yStep){
        ctx.fillText(formatTickValue(v, yStep), state.origin.x + fontPx(6), y - fontPx(4));
      }
      for(let y = state.origin.y + yStepPx, v = -yStep; y <= canvas.height; y += yStepPx, v -= yStep){
        ctx.fillText(formatTickValue(v, yStep), state.origin.x + fontPx(6), y - fontPx(4));
      }

      ctx.restore();
    }

    function drawFit(){
      const xppu = xPixelsPerUnit();
      const yppu = yPixelsPerUnit();
      if(!state.showFit) return;

      ctx.save();
      ctx.strokeStyle = rgbaFromHex(state.styles.fit.color, state.styles.fit.opacity);
      ctx.lineWidth = linePx(state.styles.fit.width);
      applyLineStyle(ctx, state.styles.fit);

      let started = false;
      for(let px = 0; px <= canvas.width; px += 1){
        const x = (px - state.origin.x) / xppu;
        const y = evaluateFit(x);
        const py = state.origin.y - y * yppu;
        if(!Number.isFinite(py)){
          started = false;
          continue;
        }
        if(!started){
          ctx.beginPath();
          ctx.moveTo(px, py);
          started = true;
        } else {
          ctx.lineTo(px, py);
        }
      }
      if(started) ctx.stroke();
      ctx.restore();
    }

    function render(){
      clampLegendIntoCanvas();
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if(state.image){
        ctx.drawImage(state.image, 0, 0, canvas.width, canvas.height);
      } else {
        const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        grad.addColorStop(0, "#f8fafc");
        grad.addColorStop(1, "#e2e8f0");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#64748b";
        ctx.font = "24px Arial";
        ctx.fillText("Bild per Drag-and-drop oder Dateidialog laden", 40, 60);
      }

      if(state.showGrid) drawGrid();
      if(state.showAxes) drawAxes();
      if(state.showFit) drawFit();
      drawLegend();

      if(state.showHandles){
        drawHandle(state.origin, "", "#16a34a");
        drawHandle(state.xPoint, String(state.xPoint.value) + " auf x", "#2563eb");
        drawHandle(state.yPoint, String(state.yPoint.value) + " auf y", "#7c3aed");
      }

      scaleInfoX.textContent = "x: " + xPixelsPerUnit().toFixed(2) + " px pro Einheit";
      scaleInfoY.textContent = "y: " + yPixelsPerUnit().toFixed(2) + " px pro Einheit";
    }

    browseBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if(file) loadImageFromFile(file);
    });

    dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropzone.classList.add("drag");
    });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("drag");
      const file = e.dataTransfer.files[0];
      if(file) loadImageFromFile(file);
    });

    xRefValue.addEventListener("change", () => {
      const v = Number(xRefValue.value) || 1;
      state.xPoint.value = v;
      render();
    });

    yRefValue.addEventListener("change", () => {
      const v = Number(yRefValue.value) || 1;
      state.yPoint.value = v;
      render();
    });

    resetAxesBtn.addEventListener("click", () => {
      setDefaultAxesForImage();
      clampLegendIntoCanvas();
      render();
    });

    fitTypeSelect.addEventListener("change", () => {
      state.fitType = fitTypeSelect.value;
      initParams();
    });



    fitSettingsBtn.onclick = () => toggleSettingsPanel("fit");
    gridSettingsBtn.onclick = () => toggleSettingsPanel("grid");
    axesSettingsBtn.onclick = () => toggleSettingsPanel("axes");
    legendSettingsBtn.onclick = () => toggleSettingsPanel("legend");

    exportBtn.addEventListener("click", () => {
      const prevHandles = state.showHandles;
      const prevExportClean = measureState.exportClean;
      const prevTabBtn = document.querySelector(".tabbtn.active");
      const prevTabName = prevTabBtn?.dataset.tab || "axes";

      state.showHandles = false;
      measureState.exportClean = true;

      if(prevTabName !== "measure"){
        document.querySelectorAll(".tabbtn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        const measureBtn = document.querySelector('.tabbtn[data-tab="measure"]');
        const measureTab = document.getElementById("tab-measure");
        if(measureBtn) measureBtn.classList.add("active");
        if(measureTab) measureTab.classList.add("active");
      }

      render();

      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = canvas.width;
      exportCanvas.height = canvas.height;
      const exportCtx = exportCanvas.getContext("2d");
      exportCtx.drawImage(canvas, 0, 0);
      drawExportLegend(exportCtx, exportCanvas.width, exportCanvas.height);

      const link = document.createElement("a");
      link.href = exportCanvas.toDataURL("image/png");
      link.download = "fit-overlay-export.png";
      document.body.appendChild(link);
      link.click();
      link.remove();

      if(prevTabName !== "measure"){
        document.querySelectorAll(".tabbtn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        const prevBtn = document.querySelector(`.tabbtn[data-tab="${prevTabName}"]`);
        const prevTab = document.getElementById("tab-" + prevTabName);
        if(prevBtn) prevBtn.classList.add("active");
        if(prevTab) prevTab.classList.add("active");
      }

      state.showHandles = prevHandles;
      measureState.exportClean = prevExportClean;
      render();
    });

    canvas.addEventListener("pointerdown", (e) => {
      const p = getMousePos(e);
      state.activeDrag = pickHandle(p);
      if(state.activeDrag){
        canvas.setPointerCapture?.(e.pointerId);
        e.preventDefault();
      }
    });

    canvas.addEventListener("pointermove", (e) => {
      if(!state.activeDrag) return;
      const p = getMousePos(e);

      if(state.activeDrag === "origin"){
        const dx = p.x - state.origin.x;
        const dy = p.y - state.origin.y;
        state.origin = { x: clamp(p.x, 0, canvas.width), y: clamp(p.y, 0, canvas.height) };
        state.xPoint = {
          ...state.xPoint,
          x: clamp(state.xPoint.x + dx, 0, canvas.width),
          y: clamp(state.xPoint.y + dy, 0, canvas.height)
        };
        state.yPoint = {
          ...state.yPoint,
          x: clamp(state.yPoint.x + dx, 0, canvas.width),
          y: clamp(state.yPoint.y + dy, 0, canvas.height)
        };
      }

      if(state.activeDrag === "xPoint"){
        state.xPoint = {
          ...state.xPoint,
          x: clamp(p.x, 0, canvas.width),
          y: state.origin.y
        };
      }

      if(state.activeDrag === "yPoint"){
        state.yPoint = {
          ...state.yPoint,
          x: state.origin.x,
          y: clamp(p.y, 0, canvas.height)
        };
      }

      e.preventDefault();
      render();
    });

    function stopDrag(e){
      state.activeDrag = null;
      if(e && e.pointerId !== undefined){
        try { canvas.releasePointerCapture?.(e.pointerId); } catch(_err) {}
        try { legendOverlay.releasePointerCapture?.(e.pointerId); } catch(_err) {}
      }
    }
    canvas.addEventListener("pointerup", stopDrag);
    canvas.addEventListener("pointercancel", stopDrag);
    canvas.addEventListener("pointerleave", stopDrag);
    legendOverlay.addEventListener("pointerup", stopDrag);
    legendOverlay.addEventListener("pointercancel", stopDrag);
    window.addEventListener("pointerup", stopDrag);

    document.querySelectorAll(".tabbtn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tabbtn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
      });
    });

    setCanvasSize(900, 600);
    state.paramState = buildDefaultParamState(state.fitType);
    state.legendPos = { x: Math.max(24, canvas.width - 150), y: 24 };
    renderParamControls();
    renderSettingsPanels();
    render();
  </script>

<script>
(() => {
  const measureTool = document.getElementById("measureTool");
  const measurePointControls = document.getElementById("measurePointControls");
  const measureSegmentControls = document.getElementById("measureSegmentControls");
  const measureAngleControls = document.getElementById("measureAngleControls");
  const measurePolygonControls = document.getElementById("measurePolygonControls");
  const measurePolygonStyleControls = document.getElementById("measurePolygonStyleControls");
  const stampPointBtn = document.getElementById("stampPointBtn");
  const deleteStampBtn = document.getElementById("deleteStampBtn");
  const stampSegmentBtn = document.getElementById("stampSegmentBtn");
  const stampAngleBtn = document.getElementById("stampAngleBtn");
  const addPolygonBtn = document.getElementById("addPolygonBtn");
  const deletePolygonBtn = document.getElementById("deletePolygonBtn");
  const segmentColor = document.getElementById("segmentColor");
  const segmentWidth = document.getElementById("segmentWidth");
  const segmentLineType = document.getElementById("segmentLineType");
  const polygonStrokeColor = document.getElementById("polygonStrokeColor");
  const polygonFillColor = document.getElementById("polygonFillColor");
  const polygonStrokeWidth = document.getElementById("polygonStrokeWidth");
  const polygonFillOpacity = document.getElementById("polygonFillOpacity");

  const measureState = {
    tool: "point",
    point: { x: 0, y: 0 },
    stamps: [],
    selectedStampId: null,
    segment: {
      a: { x: 0, y: 0 },
      b: { x: 0, y: 0 },
      style: { color:"#16a34a", width:3, lineType:"solid" }
    },
    segmentStamps: [],
    angle: {
      a: { x: 0, y: 0 },
      b: { x: 0, y: 0 },
      c: { x: 0, y: 0 }
    },
    angleStamps: [],
    polygons: [],
    polygonStamps: [],
    selectedPolygonId: null,
    selectedVertexIndex: null,
    exportClean: false
  };

  let stampCounter = 1;
  let polygonCounter = 1;
  const baseRender = render;
  const baseSetDefaultAxesForImage = setDefaultAxesForImage;

  function currentTab(){
    return document.querySelector(".tabbtn.active")?.dataset.tab || "axes";
  }
  function isMeasureMode(){
    return currentTab() === "measure";
  }
  function pointHandleRadius(){ return handleRadiusPx(8); }
  function dragRadius(){ return hitRadiusPx(24); }
  function measureHitPoint(a,b,r=dragRadius()){ return Math.hypot(a.x-b.x,a.y-b.y) <= r; }

  function coordOfCanvasPoint(p){
    return {
      x: (p.x - state.origin.x) / xPixelsPerUnit(),
      y: (state.origin.y - p.y) / yPixelsPerUnit()
    };
  }
  function formatCoordPair(p){
    const c = coordOfCanvasPoint(p);
    return `(${c.x.toFixed(2)} | ${c.y.toFixed(2)})`;
  }
  function rgba(hex, opacity){
    const c = (hex || "#000000").replace("#","");
    const full = c.length === 3 ? c.split("").map(ch => ch+ch).join("") : c;
    const n = parseInt(full,16);
    const r=(n>>16)&255, g=(n>>8)&255, b=n&255;
    return `rgba(${r},${g},${b},${opacity})`;
  }
  function applyStyleToCtx(targetCtx, style){
    targetCtx.setLineDash([]);
    if(style.lineType === "dashed") targetCtx.setLineDash([10,6]);
    if(style.lineType === "dotted") targetCtx.setLineDash([2,6]);
  }
  function labelRectFor(text, pos){
    ctx.save();
    ctx.font = `${fontPx(12)}px Arial`;
    const w = ctx.measureText(text).width;
    ctx.restore();
    return { x: pos.x, y: pos.y - fontPx(14), w, h: fontPx(18) };
  }
  function pointInRect(p, r){
    return p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
  }

  function pointInPolygon(p, pts){
    let inside = false;
    for(let i = 0, j = pts.length - 1; i < pts.length; j = i++){
      const xi = pts[i].x, yi = pts[i].y;
      const xj = pts[j].x, yj = pts[j].y;
      const intersect = ((yi > p.y) !== (yj > p.y)) &&
        (p.x < (xj - xi) * (p.y - yi) / ((yj - yi) || 1e-9) + xi);
      if(intersect) inside = !inside;
    }
    return inside;
  }
  function polygonArea(pts){
    let sum = 0;
    for(let i=0;i<pts.length;i++){
      const a = coordOfCanvasPoint(pts[i]);
      const b = coordOfCanvasPoint(pts[(i+1)%pts.length]);
      sum += a.x*b.y - b.x*a.y;
    }
    return Math.abs(sum)/2;
  }
  function polygonCentroid(pts){
    let x=0, y=0;
    for(const p of pts){ x+=p.x; y+=p.y; }
    return { x:x/pts.length, y:y/pts.length };
  }
  function drawHandleMarker(p, color="#111", r=pointHandleRadius()){
    if(measureState.exportClean) return;
    ctx.save();
    ctx.fillStyle = rgba(color, 0.35);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = linePx(2);
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
    ctx.strokeStyle = color;
    ctx.lineWidth = linePx(2);
    ctx.beginPath();
    ctx.moveTo(p.x - r, p.y);
    ctx.lineTo(p.x + r, p.y);
    ctx.moveTo(p.x, p.y - r);
    ctx.lineTo(p.x, p.y + r);
    ctx.stroke();
    ctx.restore();
  }

  function resetMeasureGeometry(){
    const cx = canvas.width * 0.52;
    const cy = canvas.height * 0.45;
    const ux = Math.max(60, xPixelsPerUnit());
    const uy = Math.max(60, yPixelsPerUnit());

    measureState.point = { x: cx, y: cy };

    measureState.segment.a = { x: cx - 1.2 * ux, y: cy + 0.35 * uy };
    measureState.segment.b = { x: cx + 1.2 * ux, y: cy - 0.35 * uy };

    measureState.angle.b = { x: cx, y: cy };
    measureState.angle.a = { x: cx - 1.1 * ux, y: cy + 0.35 * uy };
    measureState.angle.c = { x: cx + 0.9 * ux, y: cy - 1.0 * uy };

    if(measureState.selectedPolygonId != null){
      const poly = measureState.polygons.find(p => p.id === measureState.selectedPolygonId && !p.closed);
      if(poly && poly.pts.length === 0){
        poly.pts.push(
          { x: cx - 0.8 * ux, y: cy + 0.5 * uy },
          { x: cx + 0.8 * ux, y: cy + 0.4 * uy },
          { x: cx + 0.2 * ux, y: cy - 0.8 * uy }
        );
      }
    }
  }

  function defaultPolygon(){
    return {
      id: polygonCounter++,
      pts: [],
      closed: false,
      labelPos: { x: state.origin.x + fontPx(20), y: state.origin.y - fontPx(20) }
    };
  }


  function segmentLengthUnits(seg){
    const ca = coordOfCanvasPoint(seg.a), cb = coordOfCanvasPoint(seg.b);
    return Math.hypot(cb.x-ca.x, cb.y-ca.y);
  }

  function angleDegrees(ang){
    const v1 = {x:ang.a.x-ang.b.x,y:ang.a.y-ang.b.y};
    const v2 = {x:ang.c.x-ang.b.x,y:ang.c.y-ang.b.y};
    const dot = v1.x*v2.x + v1.y*v2.y;
    return Math.acos(Math.max(-1, Math.min(1, dot / (Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y) || 1)))) * 180 / Math.PI;
  }

  function drawStampedSegment(seg){
    ctx.save();
    ctx.strokeStyle = seg.style.color;
    ctx.lineWidth = linePx(seg.style.width);
    applyStyleToCtx(ctx, seg.style);
    ctx.beginPath();
    ctx.moveTo(seg.a.x,seg.a.y); ctx.lineTo(seg.b.x,seg.b.y);
    ctx.stroke();
    ctx.restore();

    const mx=(seg.a.x+seg.b.x)/2, my=(seg.a.y+seg.b.y)/2;
    ctx.save();
    ctx.fillStyle = "#0f172a";
    ctx.font = `${fontPx(12)}px Arial`;
    ctx.fillText(segmentLengthUnits(seg).toFixed(2), mx + fontPx(8), my - fontPx(8));
    ctx.restore();
  }

  function drawStampedAngle(ang){
    ctx.save();
    ctx.strokeStyle = "#9333ea";
    ctx.lineWidth = linePx(3);
    ctx.beginPath();
    ctx.moveTo(ang.b.x,ang.b.y); ctx.lineTo(ang.a.x,ang.a.y);
    ctx.moveTo(ang.b.x,ang.b.y); ctx.lineTo(ang.c.x,ang.c.y);
    ctx.stroke();
    drawAngleArc(ang.b,ang.a,ang.c,fontPx(28));
    ctx.restore();

    ctx.save();
    ctx.fillStyle = "#0f172a";
    ctx.font = `${fontPx(12)}px Arial`;
    ctx.fillText(`${angleDegrees(ang).toFixed(1)}°`, ang.b.x + fontPx(34), ang.b.y - fontPx(16));
    ctx.restore();
  }

  function drawStampedPolygon(poly){
    if(poly.pts.length < 3) return;
    ctx.save();
    ctx.fillStyle = poly.fill;
    ctx.strokeStyle = poly.stroke;
    ctx.lineWidth = linePx(poly.strokeWidth);
    ctx.beginPath();
    ctx.moveTo(poly.pts[0].x, poly.pts[0].y);
    for(let i=1;i<poly.pts.length;i++) ctx.lineTo(poly.pts[i].x, poly.pts[i].y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.fillStyle = "#0f172a";
    ctx.font = `${fontPx(12)}px Arial`;
    ctx.fillText(polygonArea(poly.pts).toFixed(2), poly.labelPos.x, poly.labelPos.y);
    ctx.restore();
  }

  function drawMeasurePoint(){
    const p = measureState.point;
    const xHandle = { x: p.x, y: state.origin.y };
    const yHandle = { x: state.origin.x, y: p.y };

    ctx.save();
    ctx.strokeStyle = "rgba(14,165,233,0.9)";
    ctx.lineWidth = linePx(2);
    ctx.setLineDash([8,6]);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y); ctx.lineTo(xHandle.x, xHandle.y);
    ctx.moveTo(p.x, p.y); ctx.lineTo(yHandle.x, yHandle.y);
    ctx.stroke();
    ctx.restore();

    if(!measureState.exportClean){
      drawHandleMarker(p, "#0ea5e9", pointHandleRadius());
      drawHandleMarker(xHandle, "#0ea5e9", pointHandleRadius());
      drawHandleMarker(yHandle, "#0ea5e9", pointHandleRadius());
    }

    ctx.save();
    ctx.fillStyle = "#0f172a";
    ctx.font = `${fontPx(12)}px Arial`;
    ctx.fillText(formatCoordPair(p), p.x + fontPx(10), p.y - fontPx(10));
    ctx.restore();

    for(const s of measureState.stamps){
      const rr = pointHandleRadius()*0.95;
      ctx.save();
      ctx.strokeStyle = s.id === measureState.selectedStampId ? "#f97316" : "#0ea5e9";
      ctx.lineWidth = linePx(2);
      ctx.beginPath();
      ctx.moveTo(s.point.x - rr, s.point.y); ctx.lineTo(s.point.x + rr, s.point.y);
      ctx.moveTo(s.point.x, s.point.y - rr); ctx.lineTo(s.point.x, s.point.y + rr);
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.fillStyle = "#0f172a";
      ctx.font = `${fontPx(12)}px Arial`;
      ctx.fillText(s.text, s.labelPos.x, s.labelPos.y);
      ctx.restore();
    }
  }

  function drawMeasureSegment(){
    if(!(isMeasureMode() && measureState.tool === "segment")) return;
    const {a,b,style} = measureState.segment;
    ctx.save();
    ctx.strokeStyle = style.color;
    ctx.lineWidth = linePx(style.width);
    applyStyleToCtx(ctx, style);
    ctx.beginPath();
    ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    ctx.stroke();
    ctx.restore();

    if(!measureState.exportClean){
      drawHandleMarker(a, style.color, pointHandleRadius());
      drawHandleMarker(b, style.color, pointHandleRadius());
    }

    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    ctx.save();
    ctx.fillStyle = "#0f172a";
    ctx.font = `${fontPx(12)}px Arial`;
    ctx.fillText(segmentLengthUnits(measureState.segment).toFixed(2), mx + fontPx(8), my - fontPx(8));
    ctx.restore();
  }

  function drawAngleArc(center, p1, p2, radius){
    const a1 = Math.atan2(p1.y-center.y,p1.x-center.x);
    const a2 = Math.atan2(p2.y-center.y,p2.x-center.x);
    let start=a1, end=a2;
    while(end < start) end += Math.PI*2;
    if(end - start > Math.PI){
      [start,end] = [end,start+Math.PI*2];
    }
    ctx.beginPath();
    ctx.arc(center.x, center.y, radius, start, end, false);
    ctx.stroke();
  }

  function drawMeasureAngle(){
    if(!(isMeasureMode() && measureState.tool === "angle")) return;
    const {a,b,c} = measureState.angle;
    ctx.save();
    ctx.strokeStyle = "#9333ea";
    ctx.lineWidth = linePx(3);
    ctx.beginPath();
    ctx.moveTo(b.x,b.y); ctx.lineTo(a.x,a.y);
    ctx.moveTo(b.x,b.y); ctx.lineTo(c.x,c.y);
    ctx.stroke();
    drawAngleArc(b,a,c,fontPx(28));
    ctx.restore();

    if(!measureState.exportClean){
      drawHandleMarker(a, "#9333ea", pointHandleRadius());
      drawHandleMarker(b, "#9333ea", pointHandleRadius());
      drawHandleMarker(c, "#9333ea", pointHandleRadius());
    }

    ctx.save();
    ctx.fillStyle = "#0f172a";
    ctx.font = `${fontPx(12)}px Arial`;
    ctx.fillText(`${angleDegrees(measureState.angle).toFixed(1)}°`, b.x + fontPx(34), b.y - fontPx(16));
    ctx.restore();
  }

  function drawMeasurePolygons(){
    for(const poly of measureState.polygons){
      if(poly.pts.length === 0) continue;

      if(poly.closed && poly.pts.length >= 3){
        ctx.save();
        ctx.fillStyle = rgba(polygonFillColor.value, Number(polygonFillOpacity.value));
        ctx.strokeStyle = polygonStrokeColor.value;
        ctx.lineWidth = linePx(Number(polygonStrokeWidth.value));
        ctx.beginPath();
        ctx.moveTo(poly.pts[0].x, poly.pts[0].y);
        for(let i=1;i<poly.pts.length;i++) ctx.lineTo(poly.pts[i].x, poly.pts[i].y);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      } else if(isMeasureMode() && measureState.tool === "polygon"){
        ctx.save();
        ctx.strokeStyle = polygonStrokeColor.value;
        ctx.lineWidth = linePx(Number(polygonStrokeWidth.value));
        ctx.beginPath();
        ctx.moveTo(poly.pts[0].x, poly.pts[0].y);
        for(let i=1;i<poly.pts.length;i++) ctx.lineTo(poly.pts[i].x, poly.pts[i].y);
        ctx.stroke();
        ctx.restore();
      }

      if(!measureState.exportClean && isMeasureMode() && measureState.tool === "polygon" && poly.id === measureState.selectedPolygonId){
        for(let i=0;i<poly.pts.length;i++){
          drawHandleMarker(
            poly.pts[i],
            i===measureState.selectedVertexIndex ? "#f97316" : "#dc2626",
            pointHandleRadius()
          );
        }
      }

      if(poly.closed && poly.pts.length >= 3){
        const area = polygonArea(poly.pts);
        ctx.save();
        ctx.fillStyle = "#0f172a";
        ctx.font = `${fontPx(12)}px Arial`;
        ctx.fillText(area.toFixed(2), poly.labelPos.x, poly.labelPos.y);
        ctx.restore();
      }
    }
  }

  function drawMeasureOverlay(){
    // persistent point stamps in all modes
    for(const s of measureState.stamps){
      const rr = pointHandleRadius()*0.95;
      ctx.save();
      ctx.strokeStyle = s.id === measureState.selectedStampId && isMeasureMode() && measureState.tool === "point" && !measureState.exportClean ? "#f97316" : "#0ea5e9";
      ctx.lineWidth = linePx(2);
      ctx.beginPath();
      ctx.moveTo(s.point.x - rr, s.point.y); ctx.lineTo(s.point.x + rr, s.point.y);
      ctx.moveTo(s.point.x, s.point.y - rr); ctx.lineTo(s.point.x, s.point.y + rr);
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.fillStyle = "#0f172a";
      ctx.font = `${fontPx(12)}px Arial`;
      ctx.fillText(s.text, s.labelPos.x, s.labelPos.y);
      ctx.restore();
    }

    for(const seg of measureState.segmentStamps) drawStampedSegment(seg);
    for(const ang of measureState.angleStamps) drawStampedAngle(ang);
    drawMeasurePolygons();

    if(isMeasureMode() && !measureState.exportClean && measureState.tool === "point") drawMeasurePoint();
    if(isMeasureMode() && !measureState.exportClean && measureState.tool === "segment") drawMeasureSegment();
    if(isMeasureMode() && !measureState.exportClean && measureState.tool === "angle") drawMeasureAngle();
  }

  render = function(){
    const prevShowHandles = state.showHandles;
    state.showHandles = prevShowHandles && !isMeasureMode();
    baseRender();
    state.showHandles = prevShowHandles;
    drawMeasureOverlay();
  };

  function pickMeasureHandle(p){
    if(measureState.tool === "point"){
      const live = measureState.point;
      const xh = {x: live.x, y: state.origin.y};
      const yh = {x: state.origin.x, y: live.y};
      if(measureHitPoint(p, live)) return "measure_point";
      if(measureHitPoint(p, xh)) return "measure_point_x";
      if(measureHitPoint(p, yh)) return "measure_point_y";

      for(const s of measureState.stamps){
        const rect = labelRectFor(s.text, s.labelPos);
        if(pointInRect(p, rect)){ measureState.selectedStampId = s.id; return `stamp_label_${s.id}`; }
        if(measureHitPoint(p, s.point, dragRadius()*0.8)){ measureState.selectedStampId = s.id; return `stamp_select_${s.id}`; }
      }
    }

    if(measureState.tool === "segment"){
      if(measureHitPoint(p, measureState.segment.a)) return "segment_a";
      if(measureHitPoint(p, measureState.segment.b)) return "segment_b";
    }

    if(measureState.tool === "angle"){
      if(measureHitPoint(p, measureState.angle.a)) return "angle_a";
      if(measureHitPoint(p, measureState.angle.b)) return "angle_b";
      if(measureHitPoint(p, measureState.angle.c)) return "angle_c";
    }

    if(measureState.tool === "polygon"){
      for(const poly of [...measureState.polygons].reverse()){
        if(poly.closed && poly.pts.length >= 3 && pointInPolygon(p, poly.pts)){
          measureState.selectedPolygonId = poly.id;
          measureState.selectedVertexIndex = null;
          return `polygon_select_${poly.id}`;
        }
        if(poly.closed && poly.pts.length >= 3){
          const rect = labelRectFor(polygonArea(poly.pts).toFixed(2), poly.labelPos);
          if(pointInRect(p, rect)){
            measureState.selectedPolygonId = poly.id;
            measureState.selectedVertexIndex = null;
            return `polygon_label_${poly.id}`;
          }
        }
        for(let i=0;i<poly.pts.length;i++){
          if(measureHitPoint(p, poly.pts[i])){
            measureState.selectedPolygonId = poly.id;
            measureState.selectedVertexIndex = i;
            return `polygon_vertex_${poly.id}_${i}`;
          }
        }
      }
    }
    return null;
  }

  canvas.addEventListener("pointerdown", (e) => {
    if(!isMeasureMode()) return;
    const p = getMousePos(e);

    if(measureState.tool === "polygon"){
      let poly = measureState.polygons.find(x => x.id === measureState.selectedPolygonId && !x.closed);

      if(poly && poly.pts.length >= 3 && measureHitPoint(p, poly.pts[0], dragRadius()*0.8)){
        poly.closed = true;
        const c = polygonCentroid(poly.pts);
        poly.labelPos = { x:c.x + fontPx(10), y:c.y - fontPx(10) };
        measureState.selectedVertexIndex = null;
        state.activeDrag = null;
        render();
        e.preventDefault();
        e.stopImmediatePropagation();
        return;
      }

      const picked = pickMeasureHandle(p);
      state.activeDrag = picked;

      if(picked && String(picked).startsWith("polygon_select_")){
        const polyId = Number(String(picked).split("_")[2]);
        measureState.selectedPolygonId = polyId;
        measureState.selectedVertexIndex = null;
        state.activeDrag = null;
        render();
        e.preventDefault();
        e.stopImmediatePropagation();
        return;
      }

      if(!picked){
        if(!poly){
          poly = defaultPolygon();
          measureState.polygons.push(poly);
          measureState.selectedPolygonId = poly.id;
        }
        poly.pts.push({ x: clamp(p.x,0,canvas.width), y: clamp(p.y,0,canvas.height) });
        measureState.selectedVertexIndex = poly.pts.length - 1;
        render();
        e.preventDefault();
        e.stopImmediatePropagation();
        return;
      }

      canvas.setPointerCapture?.(e.pointerId);
      render();
      e.preventDefault();
      e.stopImmediatePropagation();
      return;
    }

    state.activeDrag = pickMeasureHandle(p);
    if(state.activeDrag){
      canvas.setPointerCapture?.(e.pointerId);
      render();
      e.preventDefault();
      e.stopImmediatePropagation();
    }
  }, true);

  canvas.addEventListener("pointermove", (e) => {
    if(!isMeasureMode() || !state.activeDrag) return;
    const p = getMousePos(e);

    if(state.activeDrag === "measure_point"){
      measureState.point.x = clamp(p.x,0,canvas.width);
      measureState.point.y = clamp(p.y,0,canvas.height);
    } else if(state.activeDrag === "measure_point_x"){
      measureState.point.x = clamp(p.x,0,canvas.width);
    } else if(state.activeDrag === "measure_point_y"){
      measureState.point.y = clamp(p.y,0,canvas.height);
    } else if(state.activeDrag === "segment_a"){
      measureState.segment.a.x = clamp(p.x,0,canvas.width);
      measureState.segment.a.y = clamp(p.y,0,canvas.height);
    } else if(state.activeDrag === "segment_b"){
      measureState.segment.b.x = clamp(p.x,0,canvas.width);
      measureState.segment.b.y = clamp(p.y,0,canvas.height);
    } else if(state.activeDrag === "angle_a"){
      measureState.angle.a.x = clamp(p.x,0,canvas.width);
      measureState.angle.a.y = clamp(p.y,0,canvas.height);
    } else if(state.activeDrag === "angle_b"){
      measureState.angle.b.x = clamp(p.x,0,canvas.width);
      measureState.angle.b.y = clamp(p.y,0,canvas.height);
    } else if(state.activeDrag === "angle_c"){
      measureState.angle.c.x = clamp(p.x,0,canvas.width);
      measureState.angle.c.y = clamp(p.y,0,canvas.height);
    } else if(String(state.activeDrag).startsWith("stamp_label_")){
      const id = Number(String(state.activeDrag).split("_")[2]);
      const s = measureState.stamps.find(x => x.id === id);
      if(s){ s.labelPos.x = clamp(p.x,0,canvas.width); s.labelPos.y = clamp(p.y,0,canvas.height); }
    } else if(String(state.activeDrag).startsWith("polygon_label_")){
      const id = Number(String(state.activeDrag).split("_")[2]);
      const poly = measureState.polygons.find(x => x.id === id);
      if(poly){ poly.labelPos.x = clamp(p.x,0,canvas.width); poly.labelPos.y = clamp(p.y,0,canvas.height); }
    } else if(String(state.activeDrag).startsWith("polygon_vertex_")){
      const parts = String(state.activeDrag).split("_");
      const id = Number(parts[2]);
      const idx = Number(parts[3]);
      const poly = measureState.polygons.find(x => x.id === id);
      if(poly && poly.pts[idx]){
        poly.pts[idx].x = clamp(p.x,0,canvas.width);
        poly.pts[idx].y = clamp(p.y,0,canvas.height);
      }
    }

    render();
    e.preventDefault();
    e.stopImmediatePropagation();
  }, true);

  canvas.addEventListener("pointerup", (e) => {
    if(!isMeasureMode()) return;
    state.activeDrag = null;
  }, true);
  canvas.addEventListener("pointercancel", (e) => {
    if(!isMeasureMode()) return;
    state.activeDrag = null;
  }, true);

  measureTool.addEventListener("change", () => {
    measureState.tool = measureTool.value;
    measurePointControls.style.display = measureState.tool === "point" ? "" : "none";
    measureSegmentControls.style.display = measureState.tool === "segment" ? "" : "none";
    if(measureAngleControls) measureAngleControls.style.display = measureState.tool === "angle" ? "" : "none";
    measurePolygonControls.style.display = measureState.tool === "polygon" ? "" : "none";
    measurePolygonStyleControls.style.display = measureState.tool === "polygon" ? "" : "none";

    if(measureState.tool === "point" || measureState.tool === "segment" || measureState.tool === "angle"){
      resetMeasureGeometry();
    }

    if(measureState.tool === "polygon"){
      if(measureState.selectedPolygonId == null && measureState.polygons.length){
        measureState.selectedPolygonId = measureState.polygons[measureState.polygons.length - 1].id;
      }
      const activePoly = measureState.polygons.find(p => p.id === measureState.selectedPolygonId && !p.closed);
      if(activePoly && activePoly.pts.length === 0){
        const cx = canvas.width * 0.52;
        const cy = canvas.height * 0.45;
        const ux = Math.max(60, xPixelsPerUnit());
        const uy = Math.max(60, yPixelsPerUnit());
        activePoly.pts.push(
          { x: cx - 0.8 * ux, y: cy + 0.5 * uy },
          { x: cx + 0.8 * ux, y: cy + 0.4 * uy },
          { x: cx + 0.2 * ux, y: cy - 0.8 * uy }
        );
        activePoly.closed = false;
        measureState.selectedVertexIndex = activePoly.pts.length - 1;
      }
    }

    render();
  });

  stampPointBtn.addEventListener("click", () => {
    const p = {x: measureState.point.x, y: measureState.point.y};
    const stamp = {
      id: stampCounter++,
      point: p,
      text: formatCoordPair(p),
      labelPos: { x: p.x + fontPx(10), y: p.y - fontPx(10) }
    };
    measureState.stamps.push(stamp);
    measureState.selectedStampId = stamp.id;
    render();
  });

  deleteStampBtn.addEventListener("click", () => {
    if(measureState.selectedStampId == null) return;
    measureState.stamps = measureState.stamps.filter(s => s.id !== measureState.selectedStampId);
    measureState.selectedStampId = null;
    render();
  });

  stampSegmentBtn?.addEventListener("click", () => {
    measureState.segmentStamps.push({
      a: {...measureState.segment.a},
      b: {...measureState.segment.b},
      style: {...measureState.segment.style}
    });
    render();
  });

  stampAngleBtn?.addEventListener("click", () => {
    measureState.angleStamps.push({
      a: {...measureState.angle.a},
      b: {...measureState.angle.b},
      c: {...measureState.angle.c}
    });
    render();
  });

  addPolygonBtn.addEventListener("click", () => {
    const poly = defaultPolygon();
    const cx = canvas.width * 0.52;
    const cy = canvas.height * 0.45;
    const ux = Math.max(60, xPixelsPerUnit());
    const uy = Math.max(60, yPixelsPerUnit());
    poly.pts.push(
      { x: cx - 0.8 * ux, y: cy + 0.5 * uy },
      { x: cx + 0.8 * ux, y: cy + 0.4 * uy },
      { x: cx + 0.2 * ux, y: cy - 0.8 * uy }
    );
    measureState.polygons.push(poly);
    measureState.selectedPolygonId = poly.id;
    measureState.selectedVertexIndex = poly.pts.length - 1;
    render();
  });

  deletePolygonBtn.addEventListener("click", () => {
    if(measureState.selectedPolygonId == null) return;
    measureState.polygons = measureState.polygons.filter(poly => poly.id !== measureState.selectedPolygonId);
    measureState.selectedPolygonId = null;
    measureState.selectedVertexIndex = null;
    state.activeDrag = null;
    render();
  });

  segmentColor.addEventListener("input", () => { measureState.segment.style.color = segmentColor.value; render(); });
  segmentWidth.addEventListener("input", () => { measureState.segment.style.width = Number(segmentWidth.value); render(); });
  segmentLineType.addEventListener("change", () => { measureState.segment.style.lineType = segmentLineType.value; render(); });
  polygonStrokeColor.addEventListener("input", render);
  polygonFillColor.addEventListener("input", render);
  polygonStrokeWidth.addEventListener("input", render);
  polygonFillOpacity.addEventListener("input", render);

  setDefaultAxesForImage = function(){
    baseSetDefaultAxesForImage();
    resetMeasureGeometry();
  };

  document.querySelectorAll(".tabbtn").forEach(btn => {
    btn.addEventListener("click", () => {
      render();
    });
  });

  exportBtn.addEventListener("click", (e) => {
    e.stopImmediatePropagation();
    const prevHandles = state.showHandles;
    const prevClean = measureState.exportClean;
    state.showHandles = false;
    measureState.exportClean = true;
    render();

    const exportCanvas = document.createElement("canvas");
    exportCanvas.width = canvas.width;
    exportCanvas.height = canvas.height;
    const exportCtx = exportCanvas.getContext("2d");
    exportCtx.drawImage(canvas, 0, 0);
    drawExportLegend(exportCtx, exportCanvas.width, exportCanvas.height);

    const link = document.createElement("a");
    link.href = exportCanvas.toDataURL("image/png");
    link.download = "fit-overlay-export.png";
    document.body.appendChild(link);
    link.click();
    link.remove();

    state.showHandles = prevHandles;
    measureState.exportClean = prevClean;
    render();
  }, true);

  resetMeasureGeometry();
  measureTool.dispatchEvent(new Event("change"));
  render();
})();
</script>

</body>
</html>
